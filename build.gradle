plugins {
    id 'net.neoforged.moddev' version '2.0.141'
    id 'maven-publish'
}

archivesBaseName = project.archives_base_name
version = project.mod_version
group = project.mod_packagename

java.toolchain.languageVersion = JavaLanguageVersion.of(java_version as int)

neoForge {
    version = neoforge_version
    
    runs {
        client {
            client()
        }
        server {
            server()
        }
    }
    
    mods {
        lemonwebview {
            sourceSet sourceSets.main
        }
    }
}

repositories {
    mavenCentral()
}

dependencies {
    implementation "org.openjfx:javafx-web:${javafx_version}:win"
    implementation "org.openjfx:javafx-controls:${javafx_version}:win"
    implementation "org.openjfx:javafx-swing:${javafx_version}:win"
}

processResources {
    filesMatching('**/*.toml') {
        expand 'mod_id': project.mod_id,
                'mod_version': project.mod_version,
                'mod_name': project.mod_name,
                'neoforge_version': project.neoforge_version,
                'loader_version': project.loader_version,
                'neoforge_dependency': project.neoforge_dependency,
                'minecraft_version': project.minecraft_version
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}

jar {
    manifest {
        attributes([
            'Specification-Title'     : mod_name,
            'Specification-Vendor'    : mod_vendor,
            'Specification-Version'   : "1",
            'Implementation-Title'    : mod_name,
            'Implementation-Version'  : mod_version,
            'Implementation-Vendor'   : mod_vendor,
            'Implementation-Timestamp': new Date().format("yyyy-MM-dd'T'HH:mm:ssZ")
        ])
    }
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java
            groupId = project.mod_packagename
            artifactId = project.archives_base_name
            version = project.mod_version
        }
    }
    repositories {
        mavenLocal()
    }
}