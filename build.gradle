plugins {
    id 'net.neoforged.gradle.userdev' version '7.0.145'
    id 'maven-publish'
}

archivesBaseName = project.archives_base_name
version = project.mod_version
group = project.mod_packagename

java.toolchain.languageVersion = JavaLanguageVersion.of(java_version as int)

runs {
    client {
        workingDirectory project.file('run')
    }
    server {
        workingDirectory project.file('run/server')
    }
}

repositories {
    mavenCentral()
}

dependencies {
    implementation "net.neoforged:neoforge:${neoforge_version}"
    
    implementation "org.openjfx:javafx-web:${javafx_version}"
    implementation "org.openjfx:javafx-controls:${javafx_version}"
    implementation "org.openjfx:javafx-swing:${javafx_version}"
}

processResources {
    filesMatching('**/*.toml') {
        expand 'mod_id': mod_id,
                'mod_version': mod_version,
                'mod_name': mod_name,
                'neoforge_version': neoforge_version,
                'loader_version': loader_version,
                'neoforge_dependency': neoforge_dependency,
                'minecraft_version': minecraft_version
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}

jar {
    manifest {
        attributes([
            'Specification-Title'     : mod_name,
            'Specification-Vendor'    : mod_vendor,
            'Specification-Version'   : "1",
            'Implementation-Title'    : mod_name,
            'Implementation-Version'  : mod_version,
            'Implementation-Vendor'   : mod_vendor,
            'Implementation-Timestamp': new Date().format("yyyy-MM-dd'T'HH:mm:ssZ")
        ])
    }
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java
            groupId = project.mod_packagename
            artifactId = project.archives_base_name
            version = project.mod_version
        }
    }
    repositories {
        mavenLocal()
    }
}